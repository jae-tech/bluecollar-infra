#cloud-config

package_update: true
package_upgrade: false

packages:
  # Docker 설치 필수
  - apt-transport-https
  - ca-certificates
  - curl
  - gnupg

  # NFS 클라이언트
  - nfs-common

  # 시스템 기본 도구
  - vim
  - git
  - htop
  - unzip
  - wget
  - tmux

  # 네트워크 진단
  - net-tools
  - dnsutils
  - iputils-ping
  - telnet
  - nmap

  # 시스템 모니터링
  - sysstat
  - iotop

  # 보안
  - ufw
  - fail2ban

  # zsh
  - zsh
  - fonts-powerline

runcmd:
  # 방화벽 설정 (OCI Security List와 이중 보호)
  - ufw default deny incoming
  - ufw default allow outgoing
  - ufw allow 22/tcp
  - ufw allow 80/tcp
  - ufw allow 443/tcp
  - ufw --force enable

  # SSH 브루트포스 방어
  - systemctl enable fail2ban
  - systemctl start fail2ban

  # Install Docker (official repo)
  - install -m 0755 -d /etc/apt/keyrings
  - curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
  - chmod a+r /etc/apt/keyrings/docker.asc
  - echo "deb [arch=arm64 signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu noble stable" > /etc/apt/sources.list.d/docker.list
  - apt-get update -y
  - apt-get install -y docker-ce docker-ce-cli containerd.io docker-compose-plugin
  - systemctl enable docker
  - systemctl start docker
  - usermod -aG docker ubuntu

  # Create app directory
  - mkdir -p /app
  - chown ubuntu:ubuntu /app

  # zsh + Oh My Zsh + Powerlevel10k 설치
  - chsh -s /usr/bin/zsh ubuntu
  - sudo -u ubuntu sh -c 'RUNZSH=no CHSH=no sh -c "$(curl -fsSL https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh)"'
  - sudo -u ubuntu git clone --depth=1 https://github.com/romkatv/powerlevel10k.git /home/ubuntu/.oh-my-zsh/custom/themes/powerlevel10k
  - sudo -u ubuntu git clone https://github.com/zsh-users/zsh-autosuggestions /home/ubuntu/.oh-my-zsh/custom/plugins/zsh-autosuggestions
  - sudo -u ubuntu git clone https://github.com/zsh-users/zsh-syntax-highlighting /home/ubuntu/.oh-my-zsh/custom/plugins/zsh-syntax-highlighting
  - |
    sudo -u ubuntu tee /home/ubuntu/.zshrc <<'EOF'
    export ZSH="$HOME/.oh-my-zsh"
    ZSH_THEME="powerlevel10k/powerlevel10k"
    plugins=(git docker docker-compose zsh-autosuggestions zsh-syntax-highlighting)
    source $ZSH/oh-my-zsh.sh

    # Aliases
    alias ll='ls -alF'
    alias dc='docker compose'
    alias dps='docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"'
    EOF

  # NFS 마운트: DB 서버의 /data/uploads → /app/uploads
  - mkdir -p /app/uploads
  - echo "${db_private_ip}:/data/uploads /app/uploads nfs defaults,nofail,_netdev 0 0" >> /etc/fstab
  - mount -a || true
