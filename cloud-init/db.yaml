#cloud-config

package_update: true
package_upgrade: false

packages:
  # Docker 설치 필수
  - apt-transport-https
  - ca-certificates
  - curl
  - gnupg

  # 시스템 기본 도구
  - vim
  - git
  - htop
  - unzip
  - wget
  - tmux

  # 네트워크 진단
  - net-tools
  - dnsutils
  - iputils-ping
  - telnet
  - nmap

  # 시스템 모니터링
  - sysstat
  - iotop

  # 보안
  - ufw
  - fail2ban

  # zsh
  - zsh
  - fonts-powerline

runcmd:
  # 방화벽 설정 (OCI Security List와 이중 보호)
  - ufw default deny incoming
  - ufw default allow outgoing
  - ufw allow 22/tcp
  - ufw allow 55432/tcp
  - ufw allow 6379/tcp
  - ufw allow 2049/tcp
  - ufw --force enable

  # SSH 브루트포스 방어
  - systemctl enable fail2ban
  - systemctl start fail2ban

  # Install Docker (official repo)
  - install -m 0755 -d /etc/apt/keyrings
  - curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
  - chmod a+r /etc/apt/keyrings/docker.asc
  - echo "deb [arch=arm64 signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu noble stable" > /etc/apt/sources.list.d/docker.list
  - apt-get update -y
  - apt-get install -y docker-ce docker-ce-cli containerd.io docker-compose-plugin
  - systemctl enable docker
  - systemctl start docker
  - usermod -aG docker ubuntu

  # Mount Block Volume at /data (idempotent)
  - |
    DEVICE=/dev/sdb
    if ! blkid $DEVICE; then
      mkfs.ext4 $DEVICE
    fi
    mkdir -p /data
    UUID=$(blkid -s UUID -o value $DEVICE)
    grep -q "$UUID" /etc/fstab || echo "UUID=$UUID /data ext4 defaults,nofail 0 2" >> /etc/fstab
    mount -a

  # Create data directories for PostgreSQL, Redis, and uploads
  - mkdir -p /data/postgres /data/redis /data/uploads
  - chown -R 999:999 /data/postgres /data/redis
  # uploads는 ubuntu(1000)와 NFS 클라이언트(nobody)가 쓸 수 있게
  - chown -R ubuntu:ubuntu /data/uploads
  - chmod 775 /data/uploads

  # Create docker-compose file for DB stack
  - mkdir -p /app
  - chown ubuntu:ubuntu /app
  - |
    cat > /app/docker-compose.yml <<'EOF'
    services:
      postgres:
        image: postgres:17-alpine
        restart: unless-stopped
        environment:
          POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
        secrets:
          - postgres_password
        volumes:
          - /data/postgres:/var/lib/postgresql/data
        ports:
          - "55432:5432"

      redis:
        image: redis:7-alpine
        restart: unless-stopped
        command: redis-server --appendonly yes
        volumes:
          - /data/redis:/data
        ports:
          - "6379:6379"

    secrets:
      postgres_password:
        file: /app/secrets/postgres_password.txt
    EOF

  # Create secrets directory
  - mkdir -p /app/secrets
  - chown ubuntu:ubuntu /app/secrets
  - chmod 700 /app/secrets

  # Start DB stack (password file must exist — create placeholder if not)
  - |
    if [ ! -f /app/secrets/postgres_password.txt ]; then
      echo "changeme" > /app/secrets/postgres_password.txt
      chmod 600 /app/secrets/postgres_password.txt
      chown ubuntu:ubuntu /app/secrets/postgres_password.txt
    fi
  - cd /app && docker compose up -d

  # Register docker compose as systemd service so it restarts on reboot
  - |
    cat > /etc/systemd/system/db-stack.service <<'EOF'
    [Unit]
    Description=DB Stack (PostgreSQL + Redis)
    Requires=docker.service
    After=docker.service network-online.target
    Wants=network-online.target

    [Service]
    Type=oneshot
    RemainAfterExit=yes
    WorkingDirectory=/app
    ExecStart=/usr/bin/docker compose up -d
    ExecStop=/usr/bin/docker compose down
    User=ubuntu

    [Install]
    WantedBy=multi-user.target
    EOF
  - systemctl daemon-reload
  - systemctl enable db-stack.service

  # zsh + Oh My Zsh + Powerlevel10k 설치
  - chsh -s /usr/bin/zsh ubuntu
  - sudo -u ubuntu sh -c 'RUNZSH=no CHSH=no sh -c "$(curl -fsSL https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh)"'
  - sudo -u ubuntu git clone --depth=1 https://github.com/romkatv/powerlevel10k.git /home/ubuntu/.oh-my-zsh/custom/themes/powerlevel10k
  - sudo -u ubuntu git clone https://github.com/zsh-users/zsh-autosuggestions /home/ubuntu/.oh-my-zsh/custom/plugins/zsh-autosuggestions
  - sudo -u ubuntu git clone https://github.com/zsh-users/zsh-syntax-highlighting /home/ubuntu/.oh-my-zsh/custom/plugins/zsh-syntax-highlighting
  - |
    sudo -u ubuntu tee /home/ubuntu/.zshrc <<'EOF'
    export ZSH="$HOME/.oh-my-zsh"
    ZSH_THEME="powerlevel10k/powerlevel10k"
    plugins=(git docker docker-compose zsh-autosuggestions zsh-syntax-highlighting)
    source $ZSH/oh-my-zsh.sh

    # Aliases
    alias ll='ls -alF'
    alias dc='docker compose'
    alias dps='docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"'
    EOF

  # NFS 서버 설치 및 /data/uploads를 prod subnet에 export
  - apt-get install -y nfs-kernel-server
  - systemctl enable nfs-kernel-server
  # Prod subnet(10.0.0.0/24)에 rw 허용, no_root_squash로 컨테이너(root) 쓰기 허용
  - echo "/data/uploads 10.0.0.0/24(rw,sync,no_subtree_check,no_root_squash)" >> /etc/exports
  - exportfs -ra
  - systemctl start nfs-kernel-server
